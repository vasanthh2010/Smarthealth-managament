<script src="../js/api.js"></script>
<script>
/* ================= INIT ================= */
if (!Auth.requireRole('hospital_admin')) {
  throw new Error('Redirecting...');
}

const state = {
  beds: []
};

document.getElementById('sideHospitalName').textContent =
  Auth.getUser()?.name || '';

init();

/* ================= MAIN ================= */
function init() {
  loadBeds();
}

/* ================= API ================= */
async function loadBeds() {
  try {
    state.beds = await apiFetch('/api/beds/my');
    renderStats();
    renderBeds('all');
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function updateBedStatus(id, newStatus) {
  return apiFetch(`/api/beds/${id}/status`, {
    method: 'PUT',
    body: JSON.stringify({ status: newStatus })
  });
}

async function createBed(data) {
  return apiFetch('/api/beds', {
    method: 'POST',
    body: JSON.stringify(data)
  });
}

/* ================= UI - STATS ================= */
function renderStats() {
  const beds = state.beds;

  const available = beds.filter(b => b.status === 'available').length;
  const occupied = beds.filter(b => b.status === 'occupied').length;

  document.getElementById('bedStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Beds</div>
      <div class="stat-value">${beds.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Available</div>
      <div class="stat-value text-success">${available}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Occupied</div>
      <div class="stat-value text-danger">${occupied}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Occupancy</div>
      <div class="stat-value">
        ${beds.length ? Math.round((occupied / beds.length) * 100) : 0}%
      </div>
    </div>
  `;
}

/* ================= UI - BEDS ================= */
function renderBeds(filter) {
  const beds =
    filter === 'all'
      ? state.beds
      : state.beds.filter(b => b.ward_type === filter);

  const grid = document.getElementById('bedGrid');

  if (!beds.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">
        No beds for this ward.
      </div>
    `;
    return;
  }

  grid.innerHTML = beds.map(createBedCard).join('');
}

function createBedCard(bed) {
  return `
    <div class="bed-card ${bed.status}"
         onclick="handleBedToggle(${bed.id}, '${bed.status}', this)">
      <div class="bed-num">${bed.bed_number}</div>
      <div class="bed-type">${bed.ward_type}</div>
      <div class="bed-status">
        ${bed.status === 'available' ? '✓ Free' : '✗ Occupied'}
      </div>
    </div>
  `;
}

/* ================= EVENTS ================= */
function filterBeds(filter, el) {
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.remove('active')
  );
  el.classList.add('active');
  renderBeds(filter);
}

async function handleBedToggle(id, currentStatus, el) {
  const newStatus =
    currentStatus === 'available' ? 'occupied' : 'available';

  try {
    await updateBedStatus(id, newStatus);

    const bed = state.beds.find(b => b.id === id);
    if (bed) {
      bed.status = newStatus;
    }

    updateBedCardUI(el, newStatus);
    renderStats();

    showToast(`Bed marked as ${newStatus}`, 'success');
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function updateBedCardUI(el, status) {
  el.className = `bed-card ${status}`;
  el.querySelector('.bed-status').textContent =
    status === 'available' ? '✓ Free' : '✗ Occupied';
}

/* ================= ADD BED ================= */
async function addBed() {
  const btn = document.getElementById('addBedBtn');

  setLoading(btn, true, 'Adding...');

  try {
    await createBed({
      bed_number: document.getElementById('nbBedNum').value.trim(),
      ward_type: document.getElementById('nbWardType').value
    });

    closeModal('addBedModal');
    showToast('Bed added successfully', 'success');

    loadBeds();
  } catch (e) {
    document.getElementById('addBedMsg').innerHTML =
      `<div class="alert alert-error">${e.message}</div>`;
  }

  setLoading(btn, false);
}

/* ================= AUTH ================= */
function logout() {
  Auth.clearSession();
  window.location.href = '../index.html';
}
</script>
