<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Queue - Smart Hospital</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  .queue-table-row td { vertical-align: middle; }
  .token-num-big { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
  .filter-bar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand"><i class="fa-solid fa-hospital-user"></i> <span>Hospital</span> Admin</div>
      <div style="font-size:.75rem;color:rgba(255,255,255,.4);margin-top:.25rem;" id="sideHospitalName">Loading…</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Management</div>
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
      <a href="beds.html" class="nav-item"><i class="fa-solid fa-bed"></i> Bed Management</a>
      <a href="queue.html" class="nav-item active"><i class="fa-solid fa-people-waiting"></i> Patient Queue</a>
      <a href="doctors.html" class="nav-item"><i class="fa-solid fa-user-doctor"></i> Doctors</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm w-full" onclick="logout()" style="color:rgba(255,255,255,.6);justify-content:flex-start;"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div><h3>Patient Queue</h3><div class="text-muted text-small" id="todayDate"></div></div>
      <div class="d-flex gap-1 align-center">
        <span class="badge badge-primary" id="queueCount">0 pending</span>
        <button class="btn btn-ghost btn-sm" onclick="loadQueue()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
      </div>
    </div>

    <div class="page-content">
      <!-- Doctor Filter -->
      <div class="filter-bar">
        <label class="form-label" style="margin:0;white-space:nowrap;">Filter by Doctor:</label>
        <select class="form-control" id="doctorFilter" onchange="loadQueue()" style="max-width:260px;">
          <option value="">All Doctors</option>
        </select>
        <select class="form-control" id="statusFilter" onchange="loadQueue()" style="max-width:180px;">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="in_service">In Service</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div id="msg-area"></div>
      <div class="table-wrapper">
        <table id="queueTable">
          <thead>
            <tr>
              <th>Token</th>
              <th>Patient</th>
              <th>Contact</th>
              <th>Doctor</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="queueBody">
            <tr><td colspan="6" class="text-center" style="padding:2rem;"><div class="spinner" style="margin:auto;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
if (!Auth.requireRole('hospital_admin')) {}
document.getElementById('sideHospitalName').textContent = Auth.getUser()?.name || '';
document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'2-digit', month:'long' });

async function loadDoctors() {
  try {
    const doctors = await apiFetch('/api/doctors/my');
    const sel = document.getElementById('doctorFilter');
    doctors.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id; opt.textContent = d.name; sel.appendChild(opt);
    });
  } catch(e) {}
}

async function loadQueue() {
  const docId = document.getElementById('doctorFilter').value;
  const statusF = document.getElementById('statusFilter').value;
  try {
    let url = '/api/tokens/hospital/today';
    if (docId) url += `?doctor_id=${docId}`;
    let tokens = await apiFetch(url);
    if (statusF) tokens = tokens.filter(t => t.status === statusF);

    const pending = tokens.filter(t => t.status === 'pending').length;
    document.getElementById('queueCount').textContent = `${pending} pending`;

    if (!tokens.length) {
      document.getElementById('queueBody').innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding:2rem;">No patients found</td></tr>';
      return;
    }
    document.getElementById('queueBody').innerHTML = tokens.map(t => `
      <tr class="queue-table-row">
        <td><span class="token-num-big">#${t.token_number}</span></td>
        <td>
          <div class="fw-600">${t.patient_name}</div>
          <div class="text-muted text-small">${t.blood_group}</div>
        </td>
        <td class="text-muted text-small">${t.patient_phone}</td>
        <td>
          <div class="fw-600">${t.doctor_name}</div>
          <div class="text-muted text-small">${t.specialization}</div>
        </td>
        <td>${fmt.badge(t.status)}</td>
        <td>
          ${t.status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="updateStatus(${t.id},'in_service')">Call In</button>` : ''}
          ${t.status === 'in_service' ? `<button class="btn btn-success btn-sm" onclick="updateStatus(${t.id},'completed')">Complete</button>` : ''}
          ${t.status === 'pending' || t.status === 'in_service' ? `<button class="btn btn-ghost btn-sm" onclick="updateStatus(${t.id},'cancelled')" style="color:var(--danger);">Cancel</button>` : ''}
        </td>
      </tr>`).join('');
  } catch(e) { showToast(e.message, 'error'); }
}

async function updateStatus(id, status) {
  try {
    await apiFetch(`/api/tokens/${id}/status`, { method:'PUT', body: JSON.stringify({ status }) });
    showToast('Status updated', 'success');
    loadQueue();
  } catch(e) { showToast(e.message, 'error'); }
}

function logout() { Auth.clearSession(); window.location.href = '../index.html'; }
loadDoctors();
loadQueue();
setInterval(loadQueue, 30000);
</script>
</body>
</html>
