<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Login - Smart Hospital</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
<style>
  :root {
    --danger: #EF4444;
    --bg-dark: #020617;
    --card-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --radius-xl: 24px;
    --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body { 
    background: var(--bg-dark); 
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: white;
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center; 
    padding: 4rem 1.5rem; 
    margin: 0;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* Background Elements */
  .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%); z-index: -1; }
  .floating-orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: move-orb 20s infinite alternate linear; z-index: -1; }
  .orb1 { width: 400px; height: 400px; background: #7f1d1d; top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: #1e40af; bottom: -50px; right: -50px; }
  @keyframes move-orb { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }

  .login-card { 
    background: var(--card-bg); 
    backdrop-filter: blur(20px); 
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl); 
    padding: 3rem; 
    width: 100%;
    max-width: 440px;
    box-shadow: 0 40px 80px -20px rgba(0,0,0,0.5);
    z-index: 1;
    animation: fadeInUp 0.8s ease;
  }

  .login-logo { text-align: center; margin-bottom: 2.5rem; }
  .login-logo img { width: 80px; height: auto; filter: drop-shadow(0 0 15px rgba(239,68,68,0.3)); margin-bottom: 1.5rem; }
  .login-logo h2 { font-size: 1.75rem; font-weight: 700; margin: 0; background: linear-gradient(to bottom, #fff, #94a3b8); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-logo p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.5rem; }

  .demo-box { 
    background: rgba(239,68,68,0.05); 
    border: 1px solid rgba(239,68,68,0.2); 
    border-radius: 12px; 
    padding: 1rem; 
    margin-bottom: 2rem; 
    font-size: 0.82rem; 
    color: #f87171; 
  }

  .form-group { margin-bottom: 1.5rem; }
  .form-label { display: block; font-size: 0.85rem; font-weight: 500; color: #94a3b8; margin-bottom: 0.5rem; margin-left: 0.25rem; }
  
  .input-group { position: relative; }
  .form-control {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 0.875rem 1rem 0.875rem 2.75rem;
    color: white;
    font-size: 0.95rem;
    transition: var(--transition);
    box-sizing: border-box;
  }
  .form-control:focus {
    outline: none;
    background: rgba(255,255,255,0.06);
    border-color: var(--danger);
    box-shadow: 0 0 0 4px rgba(239,68,68,0.1);
  }
  .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 1rem; }
  .input-icon-right { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; cursor: pointer; transition: var(--transition); }
  .input-icon-right:hover { color: white; }

  .btn-danger {
    width: 100%;
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 1rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .btn-danger:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(239,68,68,0.4); }

  .text-link { color: #94a3b8; text-decoration: none; font-size: 0.85rem; transition: var(--transition); display: block; text-align: center; margin-top: 1.5rem; }
  .text-link:hover { color: white; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="floating-orb orb1"></div>
<div class="floating-orb orb2"></div>

<div class="login-card">
  <div class="login-logo">
    <img src="../images/logo.png" alt="Logo">
    <h2>Super Admin</h2>
    <p>System administrator access only</p>
  </div>

  <div class="demo-box">
    <i class="fa-solid fa-circle-info"></i> <b>Demo Credentials:</b><br>
    Username: <b>superadmin</b> &nbsp;|&nbsp; Password: <b>Admin@123</b>
  </div>

  <div id="msg-area"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-group">
        <i class="input-icon fa-solid fa-user"></i>
        <input type="text" class="form-control" id="username" placeholder="Admin username" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-group">
        <i class="input-icon fa-solid fa-lock"></i>
        <input type="password" class="form-control has-right-icon" id="password" placeholder="Admin password" required>
        <i class="input-icon-right fa-solid fa-eye" onclick="togglePwd()"></i>
      </div>
    </div>
    <button type="submit" class="btn-danger" id="loginBtn">
      <i class="fa-solid fa-right-to-bracket"></i> Access Admin Dashboard
    </button>
  </form>
  <div style="text-align:center;margin-top:1.5rem;"><a href="../index.html" class="text-link">← Back to Home</a></div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
// Redirect if already logged in - DISABLED
/*
if (Auth.isLoggedIn() && Auth.getUser()?.role === 'super_admin') {
  window.location.href = 'dashboard.html';
}
*/
function togglePwd() {
  const i = document.getElementById('password');
  const ic = document.querySelector('.input-icon-right');
  if (i.type === 'password') { i.type = 'text'; ic.className = 'input-icon-right fa-solid fa-eye-slash'; }
  else { i.type = 'password'; ic.className = 'input-icon-right fa-solid fa-eye'; }
}
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;

  if (!user || !pass) {
    showToast('Admin credentials required', 'warning');
    return;
  }

  clearError('msg-area');

  const btn = document.getElementById('loginBtn');
  setLoading(btn, true, 'Authenticating...');
  try {
    const data = await apiFetch('/api/auth/admin/login', {
      method: 'POST',
      body: JSON.stringify({ username: document.getElementById('username').value.trim(), password: document.getElementById('password').value })
    });
    Auth.setSession(data.token, { admin_id: data.admin_id, name: data.name, role: 'super_admin' });
    showToast('Welcome, Super Admin! 🛡️', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(err) {
    showError('msg-area', err.message);
    setLoading(btn, false);
  }
});
</script>
</body>
</html>
