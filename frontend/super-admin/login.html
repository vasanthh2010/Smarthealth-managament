<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Login - Smart Hospital</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
<style>
  body { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .icon { width: 64px; height: 64px; background: linear-gradient(135deg, #DC2626, #B91C1C); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; color: white; margin: 0 auto 0.75rem; box-shadow: 0 8px 24px rgba(220,38,38,0.4); }
  h2 { color: white; }
  p { color: rgba(255,255,255,0.55); font-size:.875rem; }
  .dark-input { background: rgba(255,255,255,0.08) !important; border-color: rgba(255,255,255,0.15) !important; color: white !important; }
  .dark-input::placeholder { color: rgba(255,255,255,0.35) !important; }
  .dark-label { color: rgba(255,255,255,0.8) !important; }
  .demo-box { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); border-radius: var(--radius); padding: .875rem; margin-bottom: 1.25rem; font-size:.82rem; color: rgba(255,100,100,.9); }
</style>
</head>
<body>
<div class="login-card fade-in">
  <div class="login-logo">
    <div class="icon"><i class="fa-solid fa-shield-halved"></i></div>
    <h2>Super Admin</h2>
    <p>System administrator access only</p>
  </div>

  <div class="demo-box">
    <i class="fa-solid fa-circle-info"></i> <b>Demo Credentials:</b><br>
    Username: <b>superadmin</b> &nbsp;|&nbsp; Password: <b>Admin@123</b>
  </div>

  <div id="msg-area"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label dark-label">Username</label>
      <div class="input-group">
        <i class="input-icon fa-solid fa-user" style="color:rgba(255,255,255,.4);"></i>
        <input type="text" class="form-control dark-input" id="username" placeholder="Admin username" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label dark-label">Password</label>
      <div class="input-group">
        <i class="input-icon fa-solid fa-lock" style="color:rgba(255,255,255,.4);"></i>
        <input type="password" class="form-control dark-input has-right-icon" id="password" placeholder="Admin password" required>
        <i class="input-icon-right fa-solid fa-eye" onclick="togglePwd()" style="color:rgba(255,255,255,.4);cursor:pointer;"></i>
      </div>
    </div>
    <button type="submit" class="btn btn-danger btn-full btn-lg mt-2" id="loginBtn">
      <i class="fa-solid fa-right-to-bracket"></i> Access Admin Dashboard
    </button>
  </form>
  <div style="text-align:center;margin-top:1.25rem;"><a href="../index.html" style="color:rgba(255,255,255,.4);font-size:.82rem;">← Back to Home</a></div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
if (Auth.isLoggedIn() && Auth.getUser()?.role === 'super_admin') {
  window.location.href = 'dashboard.html';
}
function togglePwd() {
  const i = document.getElementById('password');
  const ic = document.querySelector('.input-icon-right');
  if (i.type === 'password') { i.type = 'text'; ic.className = 'input-icon-right fa-solid fa-eye-slash'; }
  else { i.type = 'password'; ic.className = 'input-icon-right fa-solid fa-eye'; }
}
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearError('msg-area');
  const btn = document.getElementById('loginBtn');
  setLoading(btn, true, 'Authenticating...');
  try {
    const data = await apiFetch('/api/auth/admin/login', {
      method: 'POST',
      body: JSON.stringify({ username: document.getElementById('username').value.trim(), password: document.getElementById('password').value })
    });
    Auth.setSession(data.token, { admin_id: data.admin_id, name: data.name, role: 'super_admin' });
    showToast('Welcome, Super Admin! 🛡️', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(err) {
    showError('msg-area', err.message);
    setLoading(btn, false);
  }
});
</script>
</body>
</html>
