<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Login - Smart Hospital</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
<style>
  body { background: linear-gradient(135deg, #EFF6FF 0%, #F0FDF4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .login-box { width: 100%; max-width: 440px; }
  .login-card { background: white; border-radius: var(--radius-xl); padding: 2.5rem; box-shadow: var(--shadow-xl); border: 1px solid var(--border); }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), #60A5FA); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; color: white; margin: 0 auto 0.75rem; }
  .login-logo h2 { font-size: 1.5rem; }
  .login-logo p { color: var(--text-muted); font-size: 0.875rem; }
  .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { color: var(--text-muted); font-size: 0.8rem; }
</style>
</head>
<body>
<div class="login-box fade-in">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon"><i class="fa-solid fa-user-injured"></i></div>
      <h2>Patient Login</h2>
      <p>Sign in to access your hospital services</p>
    </div>

    <div id="msg-area"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <i class="input-icon fa-solid fa-envelope"></i>
          <input type="email" class="form-control" id="email" placeholder="you@email.com" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <i class="input-icon fa-solid fa-lock"></i>
          <input type="password" class="form-control has-right-icon" id="password" placeholder="Enter your password" required>
          <i class="input-icon-right fa-solid fa-eye" onclick="togglePwd('password',this)"></i>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="divider"><span>New patient?</span></div>
    <a href="signup.html" class="btn btn-outline btn-full">
      <i class="fa-solid fa-user-plus"></i> Create Account
    </a>
  </div>
  <div style="text-align:center;margin-top:1rem;"><a href="../index.html" class="text-muted text-small">← Back to Home</a></div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
// Redirect if already logged in - DISABLED for demo stability
/*
if (Auth.isLoggedIn() && Auth.getUser()?.role === 'patient') {
  window.location.href = 'home.html';
}
*/
function togglePwd(id, icon) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; icon.className = 'input-icon-right fa-solid fa-eye-slash'; }
  else { input.type = 'password'; icon.className = 'input-icon-right fa-solid fa-eye'; }
}
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  clearError('msg-area');
  const btn = document.getElementById('loginBtn');
  setLoading(btn, true, 'Signing in...');
  try {
    const data = await apiFetch('/api/auth/patient/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('email').value.trim().toLowerCase(),
        password: document.getElementById('password').value
      })
    });
    Auth.setSession(data.token, { user_id: data.user_id, name: data.name, role: 'patient' });
    showToast(`Welcome back, ${data.name}! 👋`, 'success');
    setTimeout(() => window.location.href = 'home.html', 1000);
  } catch (err) {
    showError('msg-area', err.message);
    setLoading(btn, false);
  }
});
</script>
</body>
</html>
